<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG → HTML5 Banner Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    textarea { resize: none; }

    /* ── Scrollbar ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* ── Range slider ──────────────────────────────────────── */
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      height: 4px; background: #334155; border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #6366f1; cursor: pointer;
      border: 2px solid #818cf8; transition: background 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { background: #818cf8; }

    /* ── Aspect ratio helpers ───────────────────────────────── */
    .aspect-1-1  { aspect-ratio: 1 / 1; }
    .aspect-4-5  { aspect-ratio: 4 / 5; }
    .aspect-16-9 { aspect-ratio: 16 / 9; }

    /* ── Active tab ─────────────────────────────────────────── */
    .tab-active { background: #312e81; color: #a5b4fc; border-color: #6366f1; }

    /* ── Animated status dot ────────────────────────────────── */
    @keyframes pulse-badge { 0%,100%{opacity:1} 50%{opacity:.5} }
    .live-dot { animation: pulse-badge 1.5s ease-in-out infinite; }

    /* ── Toggle switch ──────────────────────────────────────── */
    .toggle { position: relative; display: inline-block; width: 30px; height: 17px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #374151; border-radius: 17px;
      cursor: pointer; transition: background .2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 11px; height: 11px; left: 3px; bottom: 3px;
      background: #9ca3af; border-radius: 50%; transition: .2s;
    }
    .toggle input:checked + .toggle-slider { background: #4f46e5; }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(13px); background: #fff;
    }

    /* ── Layer rows ─────────────────────────────────────────── */
    .layer-row { transition: background .12s, opacity .12s; }
    .layer-row:hover { background: rgba(255,255,255,.04); }
    .layer-row.drag-active { opacity: .4; }
    /* drop-target indicator: a bright top border */
    .layer-row.drag-over { border-top: 2px solid #6366f1; }

    /* ── Drag handle ────────────────────────────────────────── */
    .drag-handle { cursor: grab; user-select: none; }
    .drag-handle:active { cursor: grabbing; }

    /* ── Play overlay button ────────────────────────────────── */
    #play-overlay {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(99,102,241,.85); border-radius: 8px;
      padding: 6px 12px; font-size: 11px; font-weight: 600;
      color: #fff; cursor: pointer; border: none;
      backdrop-filter: blur(4px);
      transition: background .15s, opacity .15s;
      opacity: 0;
      pointer-events: none;
    }
    #ratio-container:hover #play-overlay {
      opacity: 1; pointer-events: auto;
    }
    #play-overlay:hover { background: rgba(99,102,241,1); }

    /* type-badge colours (used in JS) */
    .type-bg   { background:#1e293b; color:#94a3b8; }
    .type-img  { background:#064e3b; color:#6ee7b7; }
    .type-text { background:#1e1b4b; color:#a5b4fc; }
    .type-cta  { background:#451a03; color:#fcd34d; }

    /* ── SVG Drop Zone ──────────────────────────────────────── */
    /* Wrapper that intercepts file drag events                  */
    #svg-drop-zone { position: relative; flex-shrink: 0; }

    /* Overlay shown only while a dragged file hovers the zone  */
    .drop-overlay {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      border: 2px dashed #6366f1;
      background: rgba(79, 70, 229, 0.08);
      pointer-events: none;  /* never blocks textarea interactions */
      z-index: 10;
    }
    /* Activate overlay while dragging */
    #svg-drop-zone.drag-hover .drop-overlay { display: flex; }
    /* Dim the textarea text while the overlay is visible */
    #svg-drop-zone.drag-hover textarea { opacity: 0.12; }

    /* Brief red flash on wrong file type */
    @keyframes drop-shake {
      0%,100% { transform: translateX(0);  }
      25%,75% { transform: translateX(-5px); }
      50%     { transform: translateX( 5px); }
    }
    #svg-drop-zone.drop-error { animation: drop-shake 0.35s ease-in-out; }
    #svg-drop-zone.drop-error .drop-overlay {
      display: flex;
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.08);
    }
    #svg-drop-zone.drop-error .drop-icon  { color: #f87171; }
    #svg-drop-zone.drop-error .drop-label { color: #fca5a5; }
    #svg-drop-zone.drop-error .drop-hint  { color: #f87171; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col overflow-hidden">

  <!-- ─── Header ────────────────────────────────────────────────────────── -->
  <header class="flex items-center justify-between px-5 py-2.5 border-b border-gray-800 bg-gray-950 z-10 shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 rounded-lg bg-indigo-600 flex items-center justify-center text-xs font-bold tracking-tight">H5</div>
      <h1 class="text-sm font-semibold text-gray-100">SVG → HTML5 Banner Engine</h1>
      <span class="text-xs text-gray-500 border border-gray-700 rounded-full px-2 py-0.5">v3.0</span>
    </div>

    <div class="flex items-center gap-4">
      <!-- Status badge -->
      <div id="status-badge" class="hidden items-center gap-1.5 text-xs text-emerald-400">
        <span class="w-2 h-2 rounded-full bg-emerald-400 live-dot"></span>
        <span id="status-text">Ready</span>
      </div>

      <!-- Aspect ratio quick-select -->
      <div class="flex items-center gap-1 bg-gray-900 border border-gray-700 rounded-lg p-1">
        <button class="ratio-btn tab-active text-xs px-2.5 py-1 rounded-md border border-transparent transition-all" data-ratio="1:1">1:1</button>
        <button class="ratio-btn text-xs px-2.5 py-1 rounded-md border border-transparent text-gray-400 hover:text-gray-200 transition-all" data-ratio="4:5">4:5</button>
        <button class="ratio-btn text-xs px-2.5 py-1 rounded-md border border-transparent text-gray-400 hover:text-gray-200 transition-all" data-ratio="16:9">16:9</button>
      </div>
    </div>
  </header>

  <!-- ─── Main ──────────────────────────────────────────────────────────── -->
  <main class="flex-1 flex gap-0 overflow-hidden">

    <!-- ════════════════ LEFT PANEL ════════════════ -->
    <div class="w-1/2 flex flex-col border-r border-gray-800 overflow-hidden">

      <!-- ── SVG Drop Zone ────────────────────────────────────────────────────
           The entire header + textarea block is the drop target so there is
           plenty of surface area to aim at when dragging from Finder/Explorer.
      ──────────────────────────────────────────────────────────────────────── -->
      <div id="svg-drop-zone">

        <!-- Header row -->
        <div class="flex items-center justify-between px-4 py-2 border-b border-gray-800 bg-gray-900/50">
          <div class="flex items-center gap-2">
            <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">SVG Input</span>
            <!-- Subtle hint that the zone is droppable -->
            <span class="text-xs text-gray-700">· or drop file</span>
          </div>
          <button id="clear-btn" class="text-xs text-gray-600 hover:text-gray-300 transition-colors">Clear</button>
        </div>

        <!-- Textarea -->
        <textarea
          id="svg-input"
          class="h-44 w-full bg-gray-950 text-gray-300 text-xs font-mono p-3 outline-none placeholder-gray-700 overflow-auto border-b border-gray-800 transition-opacity duration-150"
          placeholder="Drop an .svg file here, or paste code…&#10;&#10;<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 1080 1080&quot;>&#10;  …&#10;</svg>"
          spellcheck="false"
          autocomplete="off"
        ></textarea>

        <!-- Overlay: visible only while a file is dragged over the zone.
             aria-hidden so screen readers ignore the decorative prompt.    -->
        <div class="drop-overlay" aria-hidden="true">
          <!-- Upload arrow icon -->
          <svg class="w-7 h-7 drop-icon text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v8"/>
          </svg>
          <p class="drop-label text-xs font-semibold text-indigo-300">Drop SVG file here</p>
          <p class="drop-hint text-xs text-indigo-500">.svg files only</p>
        </div>

      </div><!-- /#svg-drop-zone -->

      <!-- Layer tree header -->
      <div class="flex items-center justify-between px-4 py-2 border-b border-gray-800 bg-gray-900/30 shrink-0">
        <div class="flex items-center gap-2">
          <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">Layers &amp; Sequence</span>
          <span id="layer-count" class="text-xs text-gray-600 font-mono"></span>
        </div>
        <span class="text-xs text-gray-600">drag to reorder</span>
      </div>

      <!-- Layer tree list – scrollable, grows to fill remaining space -->
      <div id="layer-tree"
           class="flex-1 overflow-y-auto px-2 py-2 space-y-0.5 min-h-0">
        <!-- Populated by renderLayerTree() -->
        <div id="layer-empty" class="flex items-center justify-center h-full text-xs text-gray-700 text-center px-4">
          Parse an SVG to see detected layers here
        </div>
      </div>

      <!-- Controls ──── -->
      <div class="shrink-0 border-t border-gray-800 bg-gray-900/60 px-4 py-3 space-y-2.5">

        <!-- Sliders row 1: Speed + Element Delay -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <div class="flex justify-between mb-1">
              <label class="text-xs text-gray-400">Anim Speed</label>
              <span id="speed-val" class="text-xs text-indigo-400 font-mono">1.0×</span>
            </div>
            <input type="range" id="speed-slider" class="w-full" min="0.2" max="3" step="0.1" value="1" />
          </div>
          <div>
            <div class="flex justify-between mb-1">
              <label class="text-xs text-gray-400">Element Delay</label>
              <span id="delay-val" class="text-xs text-indigo-400 font-mono">0.15s</span>
            </div>
            <input type="range" id="delay-slider" class="w-full" min="0.05" max="0.6" step="0.05" value="0.15" />
          </div>
        </div>

        <!-- Sliders row 2: Line Stagger + 1px Border toggle -->
        <div class="grid grid-cols-2 gap-4 items-end">
          <div>
            <div class="flex justify-between mb-1">
              <label class="text-xs text-gray-400">Line Stagger</label>
              <span id="stagger-val" class="text-xs text-indigo-400 font-mono">0.08s</span>
            </div>
            <input type="range" id="stagger-slider" class="w-full" min="0" max="0.4" step="0.02" value="0.08" />
          </div>
          <!-- 1px border toggle -->
          <div class="flex items-center justify-between pb-0.5">
            <label class="text-xs text-gray-400">1px Border</label>
            <label class="toggle" title="Add 1px inset border (publisher requirement)">
              <input type="checkbox" id="border-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <!-- ClickTag URL (full width) -->
        <div>
          <label class="text-xs text-gray-400 block mb-1">ClickTag URL</label>
          <input type="text" id="clicktag-url"
            value="https://www.example.com"
            placeholder="https://landing-page.com"
            class="w-full bg-gray-800 border border-gray-700 rounded-md px-2 py-1.5 text-xs font-mono text-gray-200 placeholder-gray-600 outline-none focus:border-indigo-500 transition-colors" />
        </div>

        <!-- Ad size + CTA override -->
        <div class="grid grid-cols-2 gap-3">
          <!-- Ad size preset -->
          <div>
            <label class="text-xs text-gray-400 block mb-1">Ad Size</label>
            <select id="ad-size"
              class="w-full bg-gray-800 border border-gray-700 rounded-md px-2 py-1.5 text-xs text-gray-200 outline-none focus:border-indigo-500 transition-colors appearance-none">
              <option value="">Auto (from SVG)</option>
              <optgroup label="Square / Social">
                <option value="1080x1080">1080×1080 — Instagram</option>
                <option value="1200x1200">1200×1200 — Facebook</option>
              </optgroup>
              <optgroup label="Portrait">
                <option value="1080x1350">1080×1350 — IG Portrait</option>
                <option value="300x600">300×600 — Half Page</option>
                <option value="160x600">160×600 — Skyscraper</option>
              </optgroup>
              <optgroup label="Landscape / Display">
                <option value="300x250">300×250 — Medium Rect</option>
                <option value="728x90">728×90 — Leaderboard</option>
                <option value="970x250">970×250 — Billboard</option>
                <option value="320x50">320×50 — Mobile Banner</option>
              </optgroup>
            </select>
          </div>
          <!-- CTA colour override -->
          <div>
            <label class="text-xs text-gray-400 block mb-1">CTA Colour Override</label>
            <input type="text" id="cta-color"
              placeholder="#E3FF00 (blank = auto)"
              class="w-full bg-gray-800 border border-gray-700 rounded-md px-2 py-1.5 text-xs font-mono text-gray-200 placeholder-gray-600 outline-none focus:border-indigo-500 transition-colors" />
          </div>
        </div>

        <!-- Action buttons -->
        <div class="flex gap-2">
          <button id="preview-btn"
            class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
            ▶ Preview Banner
          </button>
          <button id="download-btn"
            class="flex-1 bg-gray-700 hover:bg-gray-600 text-gray-200 text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
            ↓ Download ZIP
          </button>
        </div>

      </div><!-- /controls -->
    </div><!-- /left -->

    <!-- ════════════════ RIGHT PANEL ════════════════ -->
    <div class="w-1/2 flex flex-col bg-gray-950 overflow-hidden">

      <!-- Preview header -->
      <div class="flex items-center justify-between px-4 py-2 border-b border-gray-800 bg-gray-900/50 shrink-0">
        <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">Live Preview</span>
        <div class="flex items-center gap-3">
          <span id="detected-info" class="text-xs text-gray-600 font-mono"></span>
          <button id="replay-btn"
            class="hidden text-xs bg-indigo-900/60 hover:bg-indigo-800/60 border border-indigo-700/50 text-indigo-300 px-3 py-1 rounded-md transition-colors">
            ↺ Replay
          </button>
        </div>
      </div>

      <!-- Preview viewport -->
      <div class="flex-1 flex items-center justify-center p-6 overflow-hidden" id="preview-wrapper">
        <!-- Aspect-ratio container – JS sets the CSS class on it -->
        <div id="ratio-container"
             class="relative aspect-1-1 bg-black shadow-2xl shadow-black/70 overflow-hidden"
             style="max-height:100%; max-width:100%;">

          <!-- Placeholder -->
          <div id="preview-placeholder"
               class="absolute inset-0 flex flex-col items-center justify-center gap-3 text-gray-700">
            <svg class="w-12 h-12 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <p class="text-xs">Paste SVG and click Preview</p>
          </div>

          <!-- Banner iframe -->
          <iframe id="preview-frame"
            class="absolute inset-0 w-full h-full border-0 hidden"
            sandbox="allow-scripts"
            title="Banner Preview"></iframe>

          <!-- Hover play button overlay -->
          <button id="play-overlay">▶ Replay</button>

        </div>
      </div>

    </div><!-- /right -->
  </main>

  <script src="app.js"></script>
</body>
</html>
